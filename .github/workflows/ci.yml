name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck + lint + test
        run: bun run check

      - name: Build single binary
        run: bun run build

      - name: Smoke-test the binary
        run: ./dist/amux --version
